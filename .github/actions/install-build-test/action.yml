name: install-build-test
description: "Install rust, build, and test with nextest for the given target."

inputs:
  target:
    description: Build target.
    required: true

runs:
  using: composite
  steps:
    - name: Install rust
      run: |
        rustup default stable
        rustup component add rustfmt
        rustup target add ${{ inputs.target }}
      shell: bash

    - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      with:
        key: ${{ inputs.target }}
        save-if: ${{ !startsWith(github.ref, 'refs/tags/') }}

    - name: Build
      run: cargo build --target ${{ inputs.target }}
      shell: bash

    - uses: taiki-e/install-action@0fd46367812ee04360509b4169d9f659d6892bb2 # v2.79.15
      with:
        tool: cargo-nextest

    - name: Test
      run: cargo nextest run --target ${{ inputs.target }} --no-capture
      shell: bash
